name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Write signing key to file
        shell: bash
        run: echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | tr -d '\n\r' | base64 -d > "$RUNNER_TEMP/tauri-signing-key"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ runner.temp }}/tauri-signing-key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: v__VERSION__
          releaseName: 'VaultX v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
